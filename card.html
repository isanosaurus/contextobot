<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contexto Card</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      overflow: visible;
    }

    body {
      width: 500px;
      height: 1000px;
      overflow: visible;
      background: #141c26;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    .card {
      width: 100%;
      height: 100%;
      background: #141c26;
      padding: 24px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .header {
      display: flex;
      align-items: baseline;
      gap: 20px;
      margin-bottom: 20px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.5px;
      color: #8a9bad;
      flex-shrink: 0;
      text-transform: uppercase;
    }

    .header .value {
      color: #fff;
      font-size: 18px;
      font-weight: 700;
    }

    .guesses-list {
      display: flex;
      flex-direction: column;
      gap: 5px;
      overflow-y: auto;
      flex: 1;
    }

    .guess-row {
      position: relative;
      margin: 0 auto;
      padding: 0;
      height: 35px;
      margin-top: 5px;
      border-radius: 10px;
      overflow: hidden;
      background: #1c2733;
      flex-shrink: 0;
      width: 95%;
    }

    .guess-row.highlight {
      box-shadow: 0 0 0 3px #ffffff;
    }

    .guess-fill {
      position: absolute;
      top: 0;
      left: 0;
      bottom: 0;
      border-radius: 10px;
    }

    .guess-content {
      position: relative;
      z-index: 1;
      height: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 18px;
    }

    .guess-word {
      font-size: 19px;
      font-weight: 700;
      color: #fff;
    }

    .guess-distance {
      font-size: 19px;
      font-weight: 700;
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <span>GAME: <span class="value">#1</span></span>
      <span>GUESSES: <span class="value">63</span></span>
    </div>

    <div class="guesses-list">
      <div class="guess-row highlight">
        <div class="guess-fill" style="width: 99.76666666666667%; background: #12c48b;"></div>
        <div class="guess-content">
          <span class="guess-word">community</span>
          <span class="guess-distance">2</span>
        </div>
      </div>
      <div class="guess-row highlight">
        <div class="guess-fill" style="width: 99.76666666666667%; background: #12c48b;"></div>
        <div class="guess-content">
          <span class="guess-word">community</span>
          <span class="guess-distance">2</span>
        </div>
      </div>
      <div class="guess-row">
        <div class="guess-fill" style="width: 99.18333333333334%; background: #12c48b;"></div>
        <div class="guess-content">
          <span class="guess-word">city</span>
          <span class="guess-distance">7</span>
        </div>
      </div>
      <div class="guess-row">
        <div class="guess-fill" style="width: 98.83333333333333%; background: #12c48b;"></div>
        <div class="guess-content">
          <span class="guess-word">town</span>
          <span class="guess-distance">10</span>
        </div>
      </div>
      <div class="guess-row">
        <div class="guess-fill" style="width: 98.48333333333333%; background: #12c48b;"></div>
        <div class="guess-content">
          <span class="guess-word">village</span>
          <span class="guess-distance">13</span>
        </div>
      </div>
      <div class="guess-row">
        <div class="guess-fill" style="width: 98.01666666666667%; background: #12c48b;"></div>
        <div class="guess-content">
          <span class="guess-word">district</span>
          <span class="guess-distance">17</span>
        </div>
      </div>
      <div class="guess-row">
        <div class="guess-fill" style="width: 96.5%; background: #12c48b;"></div>
        <div class="guess-content">
          <span class="guess-word">park</span>
          <span class="guess-distance">30</span>
        </div>
      </div>
      <div class="guess-row">
        <div class="guess-fill" style="width: 91.83333333333333%; background: #12c48b;"></div>
        <div class="guess-content">
          <span class="guess-word">center</span>
          <span class="guess-distance">70</span>
        </div>
      </div>
      <div class="guess-row">
        <div class="guess-fill" style="width: 89.15%; background: #12c48b;"></div>
        <div class="guess-content">
          <span class="guess-word">people</span>
          <span class="guess-distance">93</span>
        </div>
      </div>
      <div class="guess-row">
        <div class="guess-fill" style="width: 87.75%; background: #12c48b;"></div>
        <div class="guess-content">
          <span class="guess-word">county</span>
          <span class="guess-distance">105</span>
        </div>
      </div>
      <div class="guess-row">
        <div class="guess-fill" style="width: 78.06666666666666%; background: #12c48b;"></div>
        <div class="guess-content">
          <span class="guess-word">police</span>
          <span class="guess-distance">188</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
